services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
