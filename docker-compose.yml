services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: udyaam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/udyaam?schema=public
    depends_on:
      - db
    restart: unless-stopped
volumes:
  pgdata:
