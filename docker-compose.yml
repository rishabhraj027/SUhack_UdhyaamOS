services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      # Copy backend/.env.example → backend/.env and fill in your values
      # On EC2: cp backend/.env.example backend/.env && nano backend/.env
      - backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
